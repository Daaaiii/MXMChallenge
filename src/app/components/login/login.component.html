<section class="login-card">
  <div class="login-heading">
    <p>Acesse sua conta</p>
    <h2>Login</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input
        type="email"
        class="form-control"
        id="email"
        formControlName="email"
        autocomplete="email"
        required
      />
      @if (form.get('email')?.invalid && form.get('email')?.touched) {
        <div class="invalid-feedback d-block">Email inválido</div>
      }
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Senha</label>
      <div class="input-group">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form-control"
          id="password"
          formControlName="password"
          autocomplete="current-password"
          required
        />
        <button
          type="button"
          class="input-group-text btn btn-outline-secondary"
          aria-label="Alternar visibilidade da senha"
          [attr.aria-pressed]="showPassword"
          (click)="showPassword = !showPassword"
        >
          <i
            class="bi"
            [class.bi-eye-fill]="!showPassword"
            [class.bi-eye-slash-fill]="showPassword"
          ></i>
        </button>
      </div>
      @if (form.get('password')?.invalid && form.get('password')?.touched) {
        <div class="invalid-feedback d-block">Senha inválida</div>
      }
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || isLoading">
      @if (!isLoading) {
        <span>Entrar</span>
      }
      @if (isLoading) {
        <span class="spinner-grow spinner-grow-sm" aria-hidden="true"></span>
        <span role="status">Entrando...</span>
      }
    </button>

    <p class="login-footer">
      Ainda não está cadastrado? <a routerLink="/register">Criar conta</a>
    </p>
  </form>
</section>
