<div class="app-shell">
  <app-sidebar></app-sidebar>

  <main class="app-main delete-main">
    <section class="delete-card surface-card">
      <div class="warning-icon" aria-hidden="true">
        <i class="bi bi-exclamation-triangle"></i>
      </div>

      <p class="eyebrow">Ação irreversível</p>
      <h1>Confirmar Exclusão do Perfil</h1>
      <p>
        Ao confirmar, seus dados de perfil serão removidos. Revise com cuidado antes de continuar.
      </p>

      @if (feedbackMessage) {
        <div class="alert alert-danger" role="alert">
          {{ feedbackMessage }}
        </div>
      }

      <div class="delete-actions">
        <button class="btn btn-secondary" type="button" [disabled]="isDeleting" (click)="cancelarExclusao()">
          Cancelar
        </button>
        <button class="btn btn-danger" type="button" [disabled]="isDeleting" (click)="confirmarExclusao()">
          Confirmar Exclusão
        </button>
      </div>
    </section>
  </main>
</div>
